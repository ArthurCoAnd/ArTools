name: artools
description: "Arthur Tools"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  complex: ^0.8.0
  csv: ^8.0.0
  cupertino_icons: ^1.0.6
  firebase_core: ^4.5.0
  flutter_form_builder: ^10.3.0+2
  form_builder_extra_fields: ^12.2.0
  form_builder_validators: ^11.3.0
  geocode: ^1.0.3
  google_fonts: ^8.0.2
  http: ^1.2.2
  intl: ^0.20.2
  location: ^8.0.0
  statistics: ^1.2.1
  syncfusion_flutter_charts: ^33.1.44
  syncfusion_flutter_datagrid: ^33.1.44
  syncfusion_flutter_pdf: ^33.1.44
  syncfusion_localizations: ^33.1.44

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/images/escudos/
    - assets/images/estádios/
    - assets/images/fundos/
    - assets/images/logos/

  fonts:
    - family: Konstruktor
      fonts:
        - asset: assets/fonts/KonstruktorRegular.ttf
          style: normal
    - family: CS
      fonts:
        - asset: assets/fonts/CounterStrikeRegular.ttf
          style: normal